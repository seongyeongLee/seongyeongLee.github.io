<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>agent-overview 문서 등록 테스트 결과 보고서</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f9f2;
      color: #1f2d1f;
    }
    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .hero, .panel {
      background: #fffefa;
      border: 1px solid #d6e7d0;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 28px rgba(41, 74, 37, 0.06);
    }
    .hero { margin-bottom: 16px; }
    .meta {
      color: #5f7f58;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .content { white-space: pre-wrap; line-height: 1.7; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="meta">테스트 결과 보고서 · 성공</div>
      <h1>agent-overview 문서 등록</h1>
    </section>
    <section class="panel">
      <div class="content" id="content">문서를 불러오는 중입니다.</div>
    </section>
  </main>
  <script>
    fetch("./2026-05-19-agent-overview-등록-테스트-결과-보고서.md")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Markdown file could not be loaded.");
        }
        return response.text();
      })
      .then((text) => {
        document.getElementById("content").textContent = text;
      })
      .catch((error) => {
        document.getElementById("content").textContent = error.message;
      });
  </script>
</body>
</html>
