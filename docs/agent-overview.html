<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>서비스 빌드 리포팅 에이전트 기능 설명서</title>
  <style>
    :root {
      --bg: #fff9f4;
      --panel: rgba(255, 255, 255, 0.94);
      --text: #2f2a26;
      --muted: #72675d;
      --line: #ecdccf;
      --accent: #c46d4b;
      --accent-soft: #fae7dc;
      --shadow: 0 12px 34px rgba(97, 62, 39, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #fffaf5 0%, #fff4ec 100%);
      color: var(--text);
      line-height: 1.65;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 56px;
    }
    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .hero {
      padding: 28px;
      margin-bottom: 18px;
    }
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }
    h1, h2, h3 { margin: 0; }
    h1 {
      font-size: clamp(28px, 4vw, 38px);
      margin-bottom: 10px;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
    }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
    }
    .panel {
      padding: 22px;
    }
    .panel-title {
      font-size: 20px;
      margin-bottom: 14px;
    }
    .source-box {
      padding: 14px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: #fffdfb;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .toc {
      display: grid;
      gap: 12px;
    }
    .toc-item {
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fffdfb;
    }
    .toc-item strong {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
    }
    .toc-item span {
      color: var(--muted);
      font-size: 14px;
    }
    .content {
      display: grid;
      gap: 14px;
    }
    .card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fffefa;
    }
    .card h3 {
      font-size: 18px;
      margin-bottom: 10px;
    }
    .card p,
    .card li {
      margin: 0;
      color: var(--text);
    }
    .card ul {
      margin: 10px 0 0 18px;
      padding: 0;
    }
    .muted {
      color: var(--muted);
    }
    .empty {
      color: var(--muted);
      font-style: italic;
    }
    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="badge-row">
        <span class="badge">Markdown 원본 기반</span>
        <span class="badge">간단 요약 UI</span>
      </div>
      <h1 id="page-title">서비스 빌드 리포팅 에이전트</h1>
      <p id="page-summary">`agent-overview.md` 문서를 읽어서 핵심 내용을 빠르게 볼 수 있도록 정리한 화면입니다.</p>
    </section>

    <section class="grid">
      <div class="panel">
        <h2 class="panel-title">문서 개요</h2>
        <div class="source-box">
          원본 문서: <strong>agent-overview.md</strong><br />
          이 페이지는 Markdown 원본 내용을 읽어 핵심 섹션을 간단하게 보여줍니다.
        </div>
        <div class="toc" id="toc"></div>
      </div>

      <div class="panel">
        <h2 class="panel-title">빠른 요약</h2>
        <div class="content" id="summary-cards"></div>
      </div>
    </section>
  </div>

  <script>
    async function loadMarkdown() {
      const response = await fetch("./agent-overview.md");
      if (!response.ok) {
        throw new Error("Markdown file could not be loaded.");
      }
      return response.text();
    }

    function parseSections(markdown) {
      const lines = markdown.split("\n");
      const sections = [];
      let current = null;

      for (const line of lines) {
        const h2 = line.match(/^##\s+(.*)$/);
        if (h2) {
          if (current) {
            sections.push(current);
          }
          current = { title: h2[1].trim(), lines: [] };
          continue;
        }
        if (current) {
          current.lines.push(line);
        }
      }

      if (current) {
        sections.push(current);
      }

      return sections;
    }

    function summarizeSection(section) {
      const cleaned = section.lines
        .map((line) => line.trim())
        .filter(Boolean)
        .filter((line) => !line.startsWith("###"));

      const bullets = cleaned
        .filter((line) => line.startsWith("- "))
        .map((line) => line.replace(/^-\s*/, ""));

      const paragraphs = cleaned
        .filter((line) => !line.startsWith("- "))
        .map((line) => line.replace(/`/g, ""));

      return {
        title: section.title,
        preview: paragraphs[0] || bullets[0] || "요약할 내용이 없습니다.",
        bullets: bullets.slice(0, 4)
      };
    }

    function render(sections) {
      const toc = document.getElementById("toc");
      const cards = document.getElementById("summary-cards");

      toc.innerHTML = "";
      cards.innerHTML = "";

      sections.forEach((section, index) => {
        const summary = summarizeSection(section);

        const tocItem = document.createElement("div");
        tocItem.className = "toc-item";
        tocItem.innerHTML = `<strong>${index + 1}. ${summary.title}</strong><span>${summary.preview}</span>`;
        toc.appendChild(tocItem);

        const card = document.createElement("article");
        card.className = "card";
        const list = summary.bullets.length
          ? `<ul>${summary.bullets.map((item) => `<li>${item}</li>`).join("")}</ul>`
          : `<p class="empty">핵심 항목이 없으면 원본 Markdown 문서를 확인하세요.</p>`;

        card.innerHTML = `
          <h3>${summary.title}</h3>
          <p class="muted">${summary.preview}</p>
          ${list}
        `;
        cards.appendChild(card);
      });
    }

    loadMarkdown()
      .then(parseSections)
      .then(render)
      .catch((error) => {
        document.getElementById("summary-cards").innerHTML = `
          <article class="card">
            <h3>문서를 불러오지 못했습니다</h3>
            <p class="muted">${error.message}</p>
          </article>
        `;
      });
  </script>
</body>
</html>
